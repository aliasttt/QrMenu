{% extends 'base.html' %}
{% load i18n %}
{% block title %}{% trans "Menu Not Found" %}{% endblock %}
{% block content %}

<div class="min-h-screen bg-dark flex items-center justify-center px-4">
  <div class="text-center fade-up">
    <i data-lucide="alert-circle" class="w-24 h-24 text-red-500 mx-auto mb-6"></i>
    <h1 class="text-4xl font-bold text-white mb-4">{% trans "Menu Not Found" %}</h1>
    <p class="text-gray-400 text-lg mb-8">{% trans "The menu you're looking for doesn't exist or has been removed." %}</p>
    <a href="/" class="px-6 py-3 rounded-xl bg-gradient-to-r from-primary to-secondary text-white font-semibold hover:shadow-lg hover:shadow-primary/25 transition-all duration-300 inline-block">
      {% trans "Go Home" %}
    </a>
  </div>
</div>

{% endblock %}
