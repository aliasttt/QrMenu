<aside
  x-cloak
  x-show="cartOpen"
  x-transition
  class="fixed right-0 top-0 z-50 h-full w-full max-w-md border-l border-slate-200 bg-white shadow-2xl"
>
  <div class="flex h-full flex-col">
    <div class="flex items-center justify-between border-b border-slate-100 px-4 py-4">
      <h2 class="text-lg font-semibold text-slate-900">Your Cart</h2>
      <button @click="cartOpen = false" class="rounded-lg p-2 hover:bg-slate-100" aria-label="Close cart">✕</button>
    </div>

    <div class="flex-1 space-y-4 overflow-y-auto px-4 py-4">
      <template x-if="items.length === 0">
        <p class="text-sm text-slate-500">Your cart is empty.</p>
      </template>

      <template x-for="item in items" :key="item.id">
        <div class="rounded-xl border border-slate-200 p-3">
          <div class="flex items-start justify-between gap-3">
            <div>
              <h3 class="font-medium text-slate-900" x-text="item.name"></h3>
              <p class="text-sm text-slate-500">$<span x-text="item.price.toFixed(2)"></span></p>
            </div>
            <div class="flex items-center gap-2">
              <button @click="decreaseQty(item.id)" class="rounded-lg border border-slate-200 px-2 py-1" aria-label="Decrease quantity">-</button>
              <span class="w-6 text-center text-sm" x-text="item.qty"></span>
              <button @click="increaseQty(item.id)" class="rounded-lg border border-slate-200 px-2 py-1" aria-label="Increase quantity">+</button>
              <button @click="removeItem(item.id)" class="rounded-lg px-2 py-1 text-xs text-rose-600 hover:bg-rose-50" aria-label="Remove item">Remove</button>
            </div>
          </div>
        </div>
      </template>
    </div>

    <div class="border-t border-slate-100 p-4">
      <div class="mb-4 flex items-center justify-between text-sm">
        <span class="text-slate-600">Subtotal</span>
        <span class="font-semibold text-slate-900">$<span x-text="subtotal.toFixed(2)"></span></span>
      </div>
      <a :href="checkoutUrl" class="btn-primary w-full">Proceed to Checkout</a>
    </div>
  </div>
</aside>
