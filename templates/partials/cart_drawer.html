<aside
  x-cloak
  x-show="cartOpen"
  x-transition:enter="transition ease-out duration-200"
  x-transition:enter-start="opacity-0 translate-x-full"
  x-transition:enter-end="opacity-100 translate-x-0"
  x-transition:leave="transition ease-in duration-150"
  x-transition:leave-start="opacity-100 translate-x-0"
  x-transition:leave-end="opacity-0 translate-x-full"
  class="fixed right-0 top-0 z-50 h-full w-full max-w-md border-l border-slate-200 bg-white shadow-2xl"
>
  <div class="flex h-full flex-col">
    <div class="flex items-center justify-between border-b border-slate-100 px-4 py-4">
      <h2 class="text-lg font-semibold text-slate-900">Your Cart</h2>
      <button @click="cartOpen = false" class="rounded-xl p-2 text-slate-500 transition hover:bg-slate-100 hover:text-slate-700" aria-label="Close cart">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="flex-1 space-y-4 overflow-y-auto px-4 py-4">
      <template x-if="items.length === 0">
        <p class="text-sm text-slate-500">Your cart is empty.</p>
      </template>

      <template x-for="item in items" :key="item.id">
        <div class="rounded-xl border border-slate-200 bg-slate-50/30 p-3">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <h3 class="font-medium text-slate-900" x-text="item.name"></h3>
              <p class="text-sm text-slate-500">$<span x-text="item.price.toFixed(2)"></span></p>
            </div>
            <div class="flex items-center gap-2">
              <button @click="decreaseQty(item.id)" class="flex h-8 w-8 items-center justify-center rounded-lg border border-slate-200 text-slate-600 transition hover:bg-white" aria-label="Decrease quantity">−</button>
              <span class="w-6 text-center text-sm font-medium" x-text="item.qty"></span>
              <button @click="increaseQty(item.id)" class="flex h-8 w-8 items-center justify-center rounded-lg border border-slate-200 text-slate-600 transition hover:bg-white" aria-label="Increase quantity">+</button>
              <button @click="removeItem(item.id)" class="rounded-lg px-2 py-1 text-xs font-medium text-rose-600 transition hover:bg-rose-50" aria-label="Remove item">Remove</button>
            </div>
          </div>
        </div>
      </template>
    </div>

    <div class="border-t border-slate-100 p-4">
      <div class="mb-4 flex items-center justify-between text-sm">
        <span class="text-slate-600">Subtotal</span>
        <span class="font-semibold text-slate-900">$<span x-text="subtotal.toFixed(2)"></span></span>
      </div>
      <a :href="checkoutUrl" class="btn-primary w-full">Proceed to Checkout</a>
    </div>
  </div>
</aside>
