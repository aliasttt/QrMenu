{% load active_link %}
<header x-data="{ mobileOpen: false }" class="sticky top-0 z-40 border-b border-slate-200 bg-white/95 backdrop-blur-md">
  <nav class="container mx-auto flex items-center justify-between px-4 py-3 sm:px-6 lg:px-8" aria-label="Panel">
    <a href="{% url 'panel_dashboard' %}" class="flex items-center gap-2 font-bold text-slate-900 transition hover:opacity-90">
      <span class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-primary text-white shadow-sm">P</span>
      <span class="hidden sm:inline">Restaurant Panel</span>
    </a>
    <ul class="hidden items-center gap-1 md:flex">
      {% for link in panel_nav_links %}
        <li>
          <a
            href="{% url link.url_name %}"
            class="rounded-full px-3 py-2 text-sm font-medium transition {% active_link link.url_name %}"
          >
            {{ link.label }}
          </a>
        </li>
      {% endfor %}
    </ul>
    <div class="flex items-center gap-2">
      <a href="{% url 'landing' %}" class="btn-tertiary hidden sm:inline-flex">Public Site</a>
      <button @click="mobileOpen = !mobileOpen" class="rounded-xl border border-slate-200 p-2.5 text-slate-700 md:hidden" aria-label="Toggle menu">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
  </nav>
  <div x-cloak x-show="mobileOpen" x-transition class="border-t border-slate-100 bg-white p-4 md:hidden">
    <div class="space-y-1">
      {% for link in panel_nav_links %}
        <a href="{% url link.url_name %}" class="block rounded-xl px-3 py-2.5 text-sm font-medium {% active_link link.url_name 'text-primary-600 bg-primary-50' 'text-slate-700 hover:bg-slate-50' %}">{{ link.label }}</a>
      {% endfor %}
      <a href="{% url 'landing' %}" class="block rounded-xl px-3 py-2.5 text-sm text-slate-700 hover:bg-slate-50">Public Site</a>
    </div>
  </div>
</header>
