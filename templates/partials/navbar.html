<header x-data="{ mobileOpen: false }" class="sticky top-0 z-40 border-b border-slate-100 bg-white/95 backdrop-blur">
  <nav class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 sm:px-6 lg:px-8" aria-label="Primary">
    <a href="/" class="flex items-center gap-2 font-bold text-slate-900" aria-label="Go to home">
      <span class="inline-flex h-8 w-8 items-center justify-center rounded-xl bg-primary text-white">Q</span>
      {{ theme.brand_name }}
    </a>

    <ul class="hidden items-center gap-8 text-sm font-medium text-slate-600 md:flex">
      {% for link in public_nav_links %}
        <li><a href="{{ link.href }}" class="hover:text-primary-600">{{ link.label }}</a></li>
      {% endfor %}
    </ul>

    <div class="hidden items-center gap-3 md:flex">
      <a href="{% url 'login' %}" class="btn-tertiary">Login</a>
      <a href="{% url 'register' %}" class="btn-primary">Get Started</a>
    </div>

    <button @click="mobileOpen = !mobileOpen" class="inline-flex rounded-xl border border-slate-200 p-2 md:hidden" aria-label="Toggle menu">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
  </nav>

  <div x-cloak x-show="mobileOpen" x-transition class="border-t border-slate-100 bg-white p-4 md:hidden">
    <div class="space-y-1 text-sm">
      {% for link in public_nav_links %}
        <a class="block rounded-lg px-3 py-2 hover:bg-primary-50" href="{{ link.href }}">{{ link.label }}</a>
      {% endfor %}
      <a class="block rounded-lg px-3 py-2 hover:bg-primary-50" href="{% url 'login' %}">Login</a>
      <a class="block rounded-lg bg-primary px-3 py-2 font-semibold text-white" href="{% url 'register' %}">Get Started</a>
    </div>
  </div>
</header>
