<header
  data-nav-sticky
  class="sticky top-0 z-40 border-b border-slate-100 bg-white/90 backdrop-blur-md transition-shadow"
  x-data="{ mobileOpen: false }"
>
  <nav class="qr-container flex items-center justify-between py-3" aria-label="Primary">
    <a href="{% url 'landing' %}" class="flex items-center gap-2 font-bold text-slate-900 transition hover:opacity-90" aria-label="Go to home">
      <span class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-primary text-white shadow-sm">Q</span>
      <span>{{ theme.brand_name }}</span>
    </a>

    <ul class="hidden items-center gap-1 md:flex text-sm font-medium">
      <li>
        <a href="{% url 'landing' %}"
           class="rounded-full px-3 py-2 {% if request.path == '/' %}text-orange-600 bg-orange-50{% else %}text-slate-600 hover:text-orange-600{% endif %}">
          Home
        </a>
      </li>
      <li>
        <a href="{% url 'features' %}"
           class="rounded-full px-3 py-2 {% if request.path == '/features/' %}text-orange-600 bg-orange-50{% else %}text-slate-600 hover:text-orange-600{% endif %}">
          Features
        </a>
      </li>
      <li>
        <a href="{% url 'how_it_works' %}"
           class="rounded-full px-3 py-2 {% if request.path == '/how-it-works/' %}text-orange-600 bg-orange-50{% else %}text-slate-600 hover:text-orange-600{% endif %}">
          How it works
        </a>
      </li>
      <li>
        <a href="{% url 'pricing' %}"
           class="rounded-full px-3 py-2 {% if request.path == '/pricing/' %}text-orange-600 bg-orange-50{% else %}text-slate-600 hover:text-orange-600{% endif %}">
          Pricing
        </a>
      </li>
      <li>
        <a href="{% url 'contact' %}"
           class="rounded-full px-3 py-2 {% if request.path == '/contact/' %}text-orange-600 bg-orange-50{% else %}text-slate-600 hover:text-orange-600{% endif %}">
          Contact
        </a>
      </li>
    </ul>

    <div class="hidden items-center gap-2 md:flex">
      <a href="{% url 'login' %}" class="qr-btn qr-btn-ghost text-sm">Login</a>
      <a href="{% url 'register' %}" class="qr-btn qr-btn-primary text-sm">Get Started</a>
    </div>

    <button @click="mobileOpen = !mobileOpen" class="inline-flex rounded-xl border border-slate-200 p-2.5 text-slate-700 transition hover:bg-slate-50 md:hidden" aria-label="Toggle menu">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
  </nav>

  <div x-cloak x-show="mobileOpen" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 -translate-y-2" x-transition:enter-end="opacity-100 translate-y-0" class="border-t border-slate-100 bg-white/95 backdrop-blur p-4 md:hidden">
    <div class="space-y-1 text-sm">
      <a class="block rounded-xl px-3 py-2.5 font-medium {% if request.path == '/' %}text-orange-600 bg-orange-50{% else %}text-slate-700 hover:bg-slate-50{% endif %}" href="{% url 'landing' %}">Home</a>
      <a class="block rounded-xl px-3 py-2.5 font-medium {% if request.path == '/features/' %}text-orange-600 bg-orange-50{% else %}text-slate-700 hover:bg-slate-50{% endif %}" href="{% url 'features' %}">Features</a>
      <a class="block rounded-xl px-3 py-2.5 font-medium {% if request.path == '/how-it-works/' %}text-orange-600 bg-orange-50{% else %}text-slate-700 hover:bg-slate-50{% endif %}" href="{% url 'how_it_works' %}">How it works</a>
      <a class="block rounded-xl px-3 py-2.5 font-medium {% if request.path == '/pricing/' %}text-orange-600 bg-orange-50{% else %}text-slate-700 hover:bg-slate-50{% endif %}" href="{% url 'pricing' %}">Pricing</a>
      <a class="block rounded-xl px-3 py-2.5 font-medium {% if request.path == '/contact/' %}text-orange-600 bg-orange-50{% else %}text-slate-700 hover:bg-slate-50{% endif %}" href="{% url 'contact' %}">Contact</a>
      <hr class="my-2 border-slate-100">
      <a class="block rounded-xl px-3 py-2.5 text-slate-700 hover:bg-slate-50" href="{% url 'login' %}">Login</a>
      <a class="mt-2 block rounded-xl bg-primary px-3 py-2.5 font-semibold text-white text-center hover:bg-primary-600" href="{% url 'register' %}">Get Started</a>
    </div>
  </div>
</header>
