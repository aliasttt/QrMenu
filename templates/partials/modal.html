<div
  x-cloak
  x-show="showModal"
  x-transition.opacity
  class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 p-4"
  role="dialog"
  aria-modal="true"
>
  <div @click.outside="showModal = false" class="w-full max-w-lg rounded-2xl bg-white p-6 shadow-xl">
    <div class="flex items-center justify-between">
      <h2 class="text-lg font-semibold text-slate-900">{{ modal_title }}</h2>
      <button @click="showModal = false" class="rounded-lg p-1 hover:bg-slate-100" aria-label="Close modal">✕</button>
    </div>
    <div class="mt-4">
      {{ modal_content }}
    </div>
  </div>
</div>
