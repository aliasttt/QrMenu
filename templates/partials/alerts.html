{% if messages %}
  <div class="space-y-2 pb-4">
    {% for message in messages %}
      <div
        role="alert"
        class="rounded-xl border px-4 py-3 text-sm
        {% if message.tags == 'success' %}border-emerald-200 bg-emerald-50 text-emerald-800
        {% elif message.tags == 'error' %}border-rose-200 bg-rose-50 text-rose-800
        {% else %}border-primary-200 bg-primary-50 text-primary-600{% endif %}">
        {{ message }}
      </div>
    {% endfor %}
  </div>
{% endif %}
